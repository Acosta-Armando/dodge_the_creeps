on:
  push:
    tags:
      - "v*"
jobs:
  export_game:
    # ⚠️ We switch to using a Docker container for the whole job
    runs-on: ubuntu-latest
    container:
      # Use the image corresponding to your Godot version
      # For Godot 4.5, use the latest '4-stable' tag or specify 4.x.y if available
      image: barichello/godot-ci:4-stable 
    permissions:
      contents: write
    name: Export Game (Windows & Android)
    steps:
      # 1. Checkout del código
      - name: checkout
        uses: actions/checkout@v5
      
      # 2. Setup Godot (This is usually just moving templates inside the container)
      # This step is often needed to correctly set up the environment paths
      - name: Setup Godot Environment
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          # Move the pre-installed templates from the container's root to the user path
          mv /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/
          
      # 3. Export Game (Windows & Android)
      # This single step handles the export and the Android build template installation
      - name: export game (Windows & Android)
        id: export
        run: |
          # The Godot command will automatically install the Android build template 
          # into the project's 'android/build' folder when it runs the first export.
          
          # The Android Keystore secrets are passed as environment variables 
          # to the Godot process.
          
          # Export for Windows Desktop (ZIP)
          godot --no-window --export-release "Windows Desktop" /__work/output/Windows.zip
          
          # Export for Android (APK/AAB)
          godot --no-window --export-release "Android" /__work/output/Android.apk
        env:
          # Define the output directory inside the container's temporary space
          GODOT_EXPORT_DIR: /__work/output
          
          # Pass Android secrets directly as Godot uses them from ENV
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      # 4. Upload/Save Artifacts
      # The export files are located outside the checkout path, so we use actions/upload-artifact
      - name: Upload Exported Files as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-exports
          path: /__work/output/ # This path is defined in the previous step
          
      # 5. Crear el Release
      - name: create release
        uses: ncipollo/release-action@v1.18.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          # Attach the artifacts uploaded in the previous step
          artifacts: /__work/output/*